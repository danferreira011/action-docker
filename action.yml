name: 'Action Docker'
author: 'Danilo Santos Ferreira'
description: 'Adiciona um comentário a um issue ou pull request (docker)'
inputs:
  GITHUB_TOKEN:
    description: 'Token do GitHub'
    required: true
  issue-id:
    description: 'ID do issue ou pull request'
    required: true
  comment:
    description: 'Comentário a ser adicionado'
    required: true
  GITHUB_REPOSITORY:
    description: 'Id do repo'
outputs:
  comment-id:
    description: 'ID do comentário criado'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - '${{inputs.GITHUB_TOKEN}}'
    - '${{inputs.issue-id}}'
    - '${{inputs.comment}}'
    - '${{inputs.GITHUB_REPOSITORY}}'